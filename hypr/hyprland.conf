exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = app2unit fcitx5
exec-once = app2unit awww-daemon
exec-once = app2unit ags run $HOME/Develop/hub/desktop/src/main.tsx
exec-once = app2unit ags run $HOME/Develop/hub/Hato1125/desktop/src/main.tsx

bind = SUPER, T, exec, app2unit ghostty
bind = SUPER, E, exec, app2unit zeditor -n
bind = SUPER, F, exec, app2unit nautilus -w
bind = SUPER, B, exec, app2unit blueberry
bind = SUPER, M, exec, app2unit missioncenter
bind = SUPER, W, exec, app2unit zen-browser

bind = SUPER, P, pin, activewindow

bindr = SUPER, G, exec, $HOME/.local/bin/gamemode on
bindr = SUPER, N, exec, $HOME/.local/bin/gamemode

bind = SUPER SHIFT, S, exec, hyprshot -m region
bind = SUPER SHIFT, D, exec, hyprshot -m region --clipboard-only

bind = SUPER, S, exec, ags -i shell request toggle-launcher

bind = SUPER, Q, killactive
bind = SUPER, V, togglefloating
bind = SUPER, J, togglesplit
bind = SUPER, L, fullscreen
bind = SUPER, C, centerwindow

bind = CTRL, H, movefocus, l
bind = CTRL, L, movefocus, r
bind = CTRL, K, movefocus, u
bind = CTRL, J, movefocus, d

bind = SUPER ALT, H, movewindow, l
bind = SUPER ALT, L, movewindow, r
bind = SUPER ALT, k, movewindow, u
bind = SUPER ALT, J, movewindow, d

bind = ALT, H, resizeactive, -100 0
bind = ALT, L, resizeactive, 100 0
bind = ALT, K, resizeactive, 0 -100
bind = ALT, J, resizeactive, 0 100

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER, LEFT, workspace, -1
bind = SUPER, RIGHT, workspace, +1

bindl = SUPER SHIFT, UP, exec, wpctl set-volume -l 1.25 @DEFAULT_AUDIO_SINK@ 5%+
bindl = SUPER SHIFT, DOWN, exec, wpctl set-volume -l 1.25 @DEFAULT_AUDIO_SINK@ 5%-
bindl = SUPER SHIFT, M, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.25 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

input {
  kb_layout = us
  kb_options = grp:ctrl_alt_toggle
  repeat_rate = 100
  repeat_delay = 300
  scroll_factor = 1.4
  sensitivity = -0.0725
}

general {
  border_size = 1
  col.active_border = 0x22ffffff
  col.inactive_border = 0x22ffffff
  gaps_in = 4
  gaps_out = 6
  extend_border_grab_area = 8
  allow_tearing = on

  snap {
    enabled = on
    window_gap = 16
    monitor_gap = 16
  }
}

decoration {
  rounding = 16

  blur {
    enabled = off
  }

  shadow {
    enabled = off
  }
}

misc {
  disable_hyprland_logo = on
  disable_splash_rendering = on
  animate_manual_resizes = off
  enable_anr_dialog = off
  enable_swallow = on
  background_color = 0x00000000
}

xwayland {
  use_nearest_neighbor = off
}

render {
  direct_scanout = 1
  expand_undersized_textures = off
}

cursor {
  no_hardware_cursors = 1
}

animations {
  bezier = easying,0,0.73,0.22,1.05

  animation = workspaces, 1, 2.25, easying, slide
  animation = windows, 1, 1.5, easying, popin 50%
}

ecosystem {
  no_update_news = on
  no_donation_nag = on
}

windowrule {
  name = zzz
  match:class = ^(gamescope)$
  match:title = ^(ZenlessZoneZero|ProtonFixes)$
  float = on
  center = on
  size = 1920 1080
}

windowrule {
  name = pinned
  match:pin = 1
  border_color = 0xffffffff 0xffffffff
}

source = ~/.config/hypr/local.conf
