set -g status-interval 30

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on

bind -n M-v split-window -h
bind -n M-s split-window
bind -n M-H select-pane -L
bind -n M-J select-pane -D
bind -n M-K select-pane -U
bind -n M-L select-pane -R
bind -n M-x kill-pane
bind -n C-n new-window
bind -n C-Space next-window

set -g status-style "fg=colour7,bg=colour0"
set -g window-status-style "fg=colour7,bg=colour0"
set -g window-status-current-style "fg=colour0,bg=colour7,bold"

set -g window-status-current-format "#[fg=colour7,bg=colour0]#[fg=colour0,bg=colour7,bold,italics]#I #[fg=colour0,bold,italics]#W#[fg=colour7,bg=colour0]"
set -g window-status-format "#[fg=colour239,bg=colour0]#[fg=colour0,bg=colour239,bold]#I #[fg=colour0,nobold]#W#[fg=colour239,bg=colour0]"
